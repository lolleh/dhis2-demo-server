# DO NOT use this Docker Compose file in production! 
# See the production oriented example under development instead - https://github.com/dhis2/docker-deployment

x-web-base: &web-base
  image: "${DHIS2_IMAGE:-dhis2/core-dev:local}"
  volumes:
    - ./docker/log4j2.xml:/opt/dhis2/log4j2.xml:ro
  environment:
    # JAVA_TOOL_OPTIONS: Standard JVM environment variable, works with all image types
    # (both tomcat-based dhis2/core-dev:latest and distroless dhis2/core-dev:local)
    JAVA_TOOL_OPTIONS:
      "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8081 \
      -Dlog4j2.configurationFile=/opt/dhis2/log4j2.xml
      -Djava.rmi.server.hostname=127.0.0.1 \
      -Dcom.sun.management.jmxremote \
      -Dcom.sun.management.jmxremote.port=9010 \
      -Dcom.sun.management.jmxremote.local.only=false \
      -Dcom.sun.management.jmxremote.authenticate=false \
      -Dcom.sun.management.jmxremote.ssl=false"
    DB_HOSTNAME: ${DB_HOSTNAME:-db}
    DB_NAME: ${DB_NAME:-dhis}
    DB_USERNAME: ${DB_USERNAME}
    DB_PASSWORD: ${DB_PASSWORD}

x-db-base: &db-base
  image: ghcr.io/baosystems/postgis:16-3.5
  # uncomment to enable query logging
  # command:
  #   ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]
  volumes:
    - db-dump:/docker-entrypoint-initdb.d/
  environment:
    POSTGRES_USER: ${DB_USERNAME}
    POSTGRES_DB: ${DB_NAME:-dhis}
    POSTGRES_PASSWORD: &postgres_password ${DB_USERNAME}
    PGPASSWORD: *postgres_password # needed by psql in healthcheck
  healthcheck:
    test:
      [
        "CMD-SHELL",
        'psql --no-password --quiet --username $$POSTGRES_USER postgres://127.0.0.1/$$POSTGRES_DB -p 5432 --command "SELECT ''ok''" > /dev/null',
      ]
    start_period: 120s
    interval: 1s
    timeout: 3s
    retries: 5
  depends_on:
    db-dump:
      condition: service_completed_successfully # make sure the DB dump has been downloaded

services:
  web:
    <<: *web-base
    volumes:
      - ./docker/log4j2.xml:/opt/dhis2/log4j2.xml:ro
      - ./docker/dhis.conf:/opt/dhis2/dhis.conf:ro
      - ./custom-login:/custom-login:ro
      - ./docker/start-with-custom-login.sh:/start-with-custom-login.sh:ro
    command: sh /start-with-custom-login.sh
    ports:
      - "127.0.0.1:8091:8080" # DHIS2
      - "127.0.0.1:8089:8081" # Debugger
      - "127.0.0.1:9011:9010" # JMX port
    depends_on:
      db:
        condition: service_healthy

  db:
    <<: *db-base
    volumes:
      - db-dump:/docker-entrypoint-initdb.d/:ro
      - pg-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"

  # Test synchronizing data and metadata between two DHIS2 instances
  # Run
  #   docker compose --profile sync up

  web-sync:
    <<: *web-base
    volumes:
      - ./docker/log4j2.xml:/opt/dhis2/log4j2.xml:ro
      - ./docker/dhis-sync.conf:/opt/dhis2/dhis.conf:ro
    profiles: [sync]
    ports:
      - "127.0.0.1:8082:8080" # DHIS2
      - "127.0.0.1:8083:8081" # Debugger: connect using commandline flag -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8083
      - "127.0.0.1:9012:9010" # JMX port (for example for VisualVM)
    depends_on:
      db-sync:
        condition: service_healthy

  db-sync:
    <<: *db-base
    profiles: [sync]
    ports:
      - "127.0.0.1:5434:5432"

  my-app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "rm -rf .d2 && [ -d node_modules ] && npm start || (npm install && npm start)"
    volumes:
      - ./my-app:/app
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - web

  bridge:
    build: ./bridge
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      DHIS2_URL: http://web:8080
      DHIS2_USERNAME: admin
      DHIS2_PASSWORD: district
      OPENMRS_URL: ${OPENMRS_URL:-http://openmrs:8080/openmrs}
      OPENMRS_USERNAME: ${OPENMRS_USERNAME:-admin}
      OPENMRS_PASSWORD: ${OPENMRS_PASSWORD:-Admin123}
      COMMCARE_DOMAIN: ${COMMCARE_DOMAIN:-}
      COMMCARE_API_KEY: ${COMMCARE_API_KEY:-}
      COMMCARE_USERNAME: ${COMMCARE_USERNAME:-}
      COMMCARE_APP_ID: ${COMMCARE_APP_ID:-}
    volumes:
      - ./bridge/src:/app/src
      - bridge-data:/app/data
    depends_on:
      - web

  init-admin:
    image: curlimages/curl:latest
    command: sh /docker/init-admin-user.sh
    volumes:
      - ./docker:/docker:ro
    depends_on:
      web:
        condition: service_started

  db-dump:
    image: busybox # busybox wget version does not have --no-clobber, so we need to do the [ -f ] test
    command: sh -c '[ -f dump.sql.gz ] && echo "dump.sql.gz exists" || wget --output-document dump.sql.gz $$DHIS2_DB_DUMP_URL' # only download file if it does not exist
    environment:
      DHIS2_DB_DUMP_URL: "${DHIS2_DB_DUMP_URL:-https://databases.dhis2.org/sierra-leone/dev/dhis2-db-sierra-leone.sql.gz}"
    working_dir: /opt/dump
    volumes:
      - db-dump:/opt/dump

volumes:
  db-dump: {}
  pg-data:
  bridge-data:
